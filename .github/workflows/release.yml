name: Release SoloMD

# Trigger: push a tag that starts with `v`, e.g.
#   git tag v0.1.0 && git push --tags
# This kicks off a matrix build across macOS / Windows / Linux and uploads
# the bundles to a draft GitHub Release named after the tag. The release
# stays a draft so you can review the artifacts before flipping the
# "Publish" switch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # also allows manual triggering from the Actions tab

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - platform: windows-latest
            args: ''
            rust_targets: ''
          # Linux x64 (.deb / .AppImage / .rpm)
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          # Linux ARM64 — for Raspberry Pi 4/5, Mac users running Linux VMs,
          # Ampere servers, and ARM Chromebooks.
          # Cross-compiled from x86_64 runner via aarch64 toolchain.
          - platform: ubuntu-22.04-arm
            args: ''
            rust_targets: ''
          # NOTE: macOS removed from CI matrix.
          # Build locally with `./scripts/build-mac.sh` (full sign + notarize)
          # then upload the resulting .dmg manually to the GitHub release.
          # Reason: notarytool can hang indefinitely on GitHub-hosted runners
          # without producing a clear error, burning hours of CI time.

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev \
            xdg-utils \
            file \
            fuse \
            libfuse2

      - name: Install frontend dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Build & release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization secrets are no longer wired here —
          # the macOS build is done locally on the maintainer's machine via
          # scripts/build-mac.sh. See scripts/README.md.
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'SoloMD ${{ github.ref_name }}'
          releaseBody: |
            ## SoloMD ${{ github.ref_name }}

            See assets below for downloads.

            ### Install / 安装

            - **macOS**: download `.dmg`, drag SoloMD to `/Applications`
            - **Windows**: download `.msi`. On first launch you may see "Windows protected your PC" → click **More info** → **Run anyway** (one-time, until SmartScreen reputation builds). 首次运行点 "更多信息" → "仍要运行" 即可
            - **Linux**: download `.AppImage` (`chmod +x` and run) or `.deb` / `.rpm`

            🤖 Auto-built by GitHub Actions
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ----------------------------------------------------------------------
      # Windows portable .zip (issue #27) — same .exe Tauri produces, just
      # zipped without the NSIS installer wrapper. Modern Win10/11 already
      # has WebView2; users without it see a runtime prompt the first time.
      # Skipped on non-Windows runners. Uploaded to the same draft release.
      # ----------------------------------------------------------------------
      - name: Build Windows portable .zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content app/package.json -Raw | ConvertFrom-Json).version
          $exe = "app/src-tauri/target/release/SoloMD.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "Missing $exe — Tauri build did not run as expected"
            exit 1
          }
          $stage = "SoloMD_${version}_x64-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe -Destination "$stage/SoloMD.exe"
          # Bundled MCP sidecar so portable users get the MCP server too.
          $mcp = "app/src-tauri/target/release/solomd-mcp.exe"
          if (Test-Path $mcp) { Copy-Item $mcp -Destination "$stage/solomd-mcp.exe" }
          # Tiny README the user finds inside the zip.
          @"
          SoloMD ${version} — portable build

          Just run SoloMD.exe. No installation required.
          Settings + recents are stored in %APPDATA%\app.solomd as usual.

          Requires Microsoft Edge WebView2 (preinstalled on Windows 10/11).
          If launch fails with a WebView2 missing error, install from
          https://go.microsoft.com/fwlink/p/?LinkId=2124703
          "@ | Set-Content -Path "$stage/README.txt" -Encoding UTF8
          $zip = "SoloMD_${version}_x64-portable.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          gh release upload "${{ github.ref_name }}" $zip --clobber
