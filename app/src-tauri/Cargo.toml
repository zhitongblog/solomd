[package]
name = "solomd"
version = "0.1.5"
description = "SoloMD — a lightweight, cross-platform Markdown + plain text editor"
authors = ["zhitong"]
edition = "2021"
# Disable auto-discovery of bins so Cargo only produces the explicit
# [[bin]] "SoloMD" below (instead of also building an implicit "solomd"
# binary from src/main.rs + package.name).
autobins = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

# Force the binary name to "SoloMD" so it matches tauri.conf.json's
# `mainBinaryName`. Without this, Cargo would produce `solomd.exe` (lowercase
# from [package].name) while Tauri's NSIS template was creating shortcuts
# pointing to a different name, causing the Windows shortcut to break.
[[bin]]
name = "SoloMD"
path = "src/main.rs"

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chardetng = "1.0.0"
encoding_rs = "0.8.35"
tauri-plugin-dialog = "2.7.0"
tauri-plugin-clipboard-manager = "2.3.2"
walkdir = "2.5.0"

