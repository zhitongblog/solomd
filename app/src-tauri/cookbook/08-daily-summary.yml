name: Daily summary
trigger: schedule
schedule: "0 22 * * *"
allow-write: true
write-cap: 1
prompt: |
  Build today's summary from the day's daily/ notes
  (today's date is {{date:YYYY-MM-DD}}). If today's daily note exists,
  read it; if not, look at the past 24h of edits via autogit_log on
  every file under daily/ and synthesize from there.

  Append a `## Day in 3 lines` section to today's daily note (creating
  it if missing) with exactly three lines:
    1. What the user spent the most words on.
    2. What got decided / closed today.
    3. What's left open going into tomorrow.

  Keep each line under 25 words.
