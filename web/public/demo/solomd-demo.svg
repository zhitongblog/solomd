<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2227"/>
      <stop offset="1" stop-color="#0f1115"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <g font-family="ui-monospace,Menlo,Consolas,monospace" fill="#a8b2c1">
    <text x="60" y="100" font-size="22" fill="#5b6273">SoloMD — Welcome.md</text>
    <text x="60" y="180" font-size="64" font-weight="700" fill="#ff9f40"># Welcome to SoloMD ✏️</text>
    <text x="60" y="260" font-size="24" fill="#cfd6df">A fast, native Markdown editor. Live preview,</text>
    <text x="60" y="296" font-size="24" fill="#cfd6df">split view, and a slideshow mode that turns</text>
    <text x="60" y="332" font-size="24" fill="#cfd6df">any doc into fullscreen slides.</text>
    <text x="60" y="420" font-size="20" fill="#7c8595">Press</text>
    <rect x="120" y="402" width="92" height="30" rx="4" fill="#2d3340" stroke="#4a5260"/>
    <text x="166" y="423" font-size="16" text-anchor="middle" fill="#cfd6df">Ctrl+K</text>
    <text x="225" y="420" font-size="20" fill="#7c8595">to see every command.</text>
  </g>
  <g font-family="-apple-system,sans-serif" fill="#5b6273">
    <text x="640" y="720" font-size="14" text-anchor="middle">Real demo coming soon — see web/public/demo/README.md</text>
  </g>
</svg>
