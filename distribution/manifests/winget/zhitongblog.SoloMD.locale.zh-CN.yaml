ShortDescription: 轻量级跨平台 Markdown 编辑器，支持所见即所得
Description: |-
  SoloMD 是一款使用 Tauri 2 构建的轻量级 Markdown + 纯文本编辑器。
  主要功能：
  - 所见即所得编辑模式
  - KaTeX 数学公式渲染
  - Mermaid 流程图
  - 多编码支持（UTF-8、GBK、Big5）
  - 导出为 PDF、DOCX、HTML
  - 亮色/暗色主题
  - 清除 AI 格式
